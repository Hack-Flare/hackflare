    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 20

  - package-ecosystem: cargo
    directory: "/hackflare_api"
    schedule:
      interval: daily
    open-pull-requests-limit: 20

  - package-ecosystem: cargo
    directory: "/hackflare_dns"
    schedule:
      interval: daily
    open-pull-requests-limit: 20

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: daily
    open-pull-requests-limit: 20