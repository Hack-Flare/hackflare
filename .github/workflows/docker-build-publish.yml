name: Build and Publish Docker Image

on:
  workflow_dispatch:
  workflow_call:
  
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hackflare

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            tag-suffix: ""
          #- runs-on: self-hosted
          #  tag-suffix: "-arm"
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect builder changes
        id: builder_changes
        run: |
          BASE_REF="${{ github.event.repository.default_branch }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
          fi
          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF...HEAD")
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(builder\.dockerfile|mix\.exs|mix\.lock|config/.*\.exs|native/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push builder image
        if: ${{ steps.builder_changes.outputs.changed == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./builder.dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-cache,mode=max

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest${{ matrix.tag-suffix }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            BUILDER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/hack-flare/hackflare:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-cache
          cache-to: type=registry,ref=ghcr.io/hack-flare/hackflare:buildcache,mode=max
