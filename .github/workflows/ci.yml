name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "README.md"
      - ".github/"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - ".github/"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19'
  OTP_VERSION: '27.0'

jobs:
  format:
    name: Auto-Format Code
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-format-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-format-

      - name: Install Dependencies
        run: mix deps.get

      - name: Run Formatter
        run: mix format

      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format Elixir code [skip ci]"
          branch: main

  compile:
    name: Compile Application
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}-

      - name: Compile Elixir + Rust
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile --warnings-as-errors

      - name: Save unified build cache
        uses: actions/cache/save@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}

  static_analysis:
    name: Static Analysis
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          
      - uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: mix credo --strict
      - run: mix deps.audit
      - run: mix sobelow --config

  type_check:
    name: Type Checking
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore/Save Dialyzer PLT Cache
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Restore Application Build
        uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Dialyzer
        run: mix dialyzer
        
  test:
    name: Test Partition ${{ matrix.partition }}
    needs: [compile]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hackflare
          POSTGRES_PASSWORD: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Setup Database
        run: |
          mkdir -p priv/repo/migrations
          mix do app.start + ecto.create + ecto.migrate
          
      - name: Run Tests
        env:
          MIX_TEST_PARTITION: ${{ matrix.partition }}
        run: mix test --partitions 4