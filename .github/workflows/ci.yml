name: CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  format:
    name: Auto-Format Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '27.0'

      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      
      - run: mix format

      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Elixir code"
          branch: main

  static_analysis:
    name: Static Analysis
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '27.0'

      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-27.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-27.0-1.19-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix deps.audit
      - run: mix sobelow --config

  type_check:
    name: Type Checking
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '27.0'

      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-27.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-27.0-1.19-

      - run: mix deps.get
      - run: mix compile
      - run: mix dialyzer

  test:
    name: Test Partition ${{ matrix.partition }}
    needs: [format]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: hackflare
          POSTGRES_PASSWORD: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '27.0'

      - uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-27.0-1.19-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-27.0-1.19-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix ecto.create && mix ecto.migrate
      
      - env:
          MIX_TEST_PARTITION: ${{ matrix.partition }}
        run: mix test --partitions 4