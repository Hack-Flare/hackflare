name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - ".github/"
      - ".github/workflows/docker-build-publish.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - ".github/"
      - ".github/workflows/docker-build-publish.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19'
  OTP_VERSION: '27.0'
  # Point Mix/Hex/Rebar at the locations populated when the builder image
  # was built (as root). GitHub Actions overrides HOME to /github/home for
  # container jobs, so without these the pre-installed Hex/Rebar archives
  # under /root/.mix wouldn't be discovered.
  MIX_HOME: /root/.mix
  HEX_HOME: /root/.hex
  REBAR_GLOBAL_CONFIG_DIR: /root/.config/rebar3
  REBAR_CACHE_DIR: /root/.cache/rebar3

jobs:
  format:
    name: Auto-Format Code
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: read
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore dependencies and build cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-format-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-format-

      - name: Install Dependencies
        run: mix deps.get

      - name: Run Formatter
        run: mix format

      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format Elixir code [skip ci]"
          branch: main

  compile:
    name: Compile Application
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore deps cache
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}-

      - name: Compile Elixir + Rust
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix compile --warnings-as-errors

      - name: Save unified build cache
        uses: actions/cache/save@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}

  static_analysis:
    name: Static Analysis
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: mix credo --strict
      - run: mix deps.audit
      - run: mix sobelow --config

  type_check:
    name: Type Checking
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore/Save Dialyzer PLT Cache
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Restore Application Build
        uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run Dialyzer
        run: mix dialyzer

  rust-checks:
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Check Crates
        run: cargo check

      - name: Clippy Crates
        run: cargo clippy -- -D warnings
        
  test:
    name: Test Partition ${{ matrix.partition }}
    needs: [compile]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container:
      image: ghcr.io/hack-flare/hackflare-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      DB_HOST: postgres
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hackflare
          POSTGRES_PASSWORD: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Setup Database
        run: |
          mkdir -p priv/repo/migrations
          mix do app.start + ecto.create + ecto.migrate

      - name: Run Tests
        env:
          MIX_TEST_PARTITION: ${{ matrix.partition }}
        run: mix test --partitions 6
