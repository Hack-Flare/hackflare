name: CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19'
  OTP_VERSION: '27.0'

jobs:
  format:
    name: Auto-Format Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
      - name: Dependencies
        run: mix deps.get
      - run: mix format
      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format Elixir code"
          branch: main

  compile:
    name: Compile Application
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - run: mix deps.get

      - name: Compile Elixir + Rust
        run: mix compile --warnings-as-errors

      # We save the cache here including the priv folder where the NIF lives
      - uses: actions/cache/save@v4
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}

  static_analysis:
    name: Static Analysis
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          
      - uses: actions/cache/restore@v4
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: mix credo --strict
      - run: mix deps.audit
      - run: mix sobelow --config

  type_check:
    name: Type Checking
    needs: [compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      - run: mix dialyzer

  test:
    name: Test Partition ${{ matrix.partition }}
    needs: [compile]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: hackflare
          POSTGRES_PASSWORD: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            deps
            _build
            priv/native
          key: ${{ runner.os }}-build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ github.sha }}
          fail-on-cache-miss: true

      # Start dependencies before running Ecto to avoid Postgrex.SCRAM errors
      - name: Setup Database
        run: |
          mkdir -p priv/repo/migrations
          mix do app.start, ecto.create, ecto.migrate
          
      - name: Run Tests
        env:
          MIX_TEST_PARTITION: ${{ matrix.partition }}
        run: mix test --partitions 4