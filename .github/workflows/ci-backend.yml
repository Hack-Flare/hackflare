name: Backend CI

on:
  push:
    paths:
      - "hackflare_api/**"
      - "hackflare_dns/**"
      - "database/migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-rust/**"
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - "hackflare_api/**"
      - "hackflare_dns/**"
      - "database/migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-rust/**"
      - "!**/*.md"

permissions:
  contents: read
  packages: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SQLX_OFFLINE: true

jobs:
  rust:
    name: Rust Checks
    runs-on: blacksmith-8vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: hackflare
          POSTGRES_USER: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls

      - name: Run migrations
        run: cargo sqlx migrate run --source database/migrations
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false

      - name: Check offline query files
        run: cargo sqlx prepare --check --workspace
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false
          SQLX_OFFLINE_DIR: database/.sqlx

      - name: Check formatting
        run: cargo fmt --all --check
