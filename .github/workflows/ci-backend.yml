name: Backend CI

on:
  push:
    paths:
      - "hackflare_api/**"
      - "hackflare_dns/**"
      - "database/migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-rust/**"
      - "!**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - "hackflare_api/**"
      - "hackflare_dns/**"
      - "database/migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-rust/**"
      - "!**/*.md"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SQLX_OFFLINE: true
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: hackflare
          POSTGRES_USER: hackflare
          POSTGRES_DB: hackflare
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-rust-cache

      - name: Cache sqlx-cli
        id: cache-sqlx-cli
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/sqlx
          key: ${{ runner.os }}-sqlx-cli-0.8.6-postgres-rustls

      - name: Install sqlx-cli
        if: steps.cache-sqlx-cli.outputs.cache-hit != 'true' 
        run: |
          cargo install sqlx-cli \
          --version 0.8.6 \
          --locked \
          --no-default-features \
          --features postgres,rustls

      # Check formatting first
      - name: Check formatting
        run: cargo fmt --all --check

      # Clippy handles what cargo check does
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run migrations
        run: cargo sqlx migrate run --source database/migrations
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false

      - name: Check offline query files
        run: cargo sqlx prepare --check --workspace
        env:
          DATABASE_URL: postgres://hackflare:hackflare@localhost:5432/hackflare
          SQLX_OFFLINE: false
          SQLX_OFFLINE_DIR: database/.sqlx

      - name: Run tests
        run: cargo test --all-features

