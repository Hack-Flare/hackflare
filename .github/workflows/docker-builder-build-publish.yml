name: Build and Publish Docker Builder Image

on:
  workflow_dispatch:
  workflow_call:
  
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hack-flare/hackflare-builder

concurrency:
  group: build-and-push
  cancel-in-progress: true

jobs:
  build-and-push-image:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            tag-suffix: ""
          #- runs-on: self-hosted
          #  tag-suffix: "-arm"
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest${{ matrix.tag-suffix }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./builder.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/hack-flare/hackflare-builder:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-cache
          cache-to: type=registry,ref=ghcr.io/hack-flare/hackflare-builder:buildcache,mode=max

      - name: Call main image build workflow
        uses: ./.github/workflows/docker-build-publish.yml