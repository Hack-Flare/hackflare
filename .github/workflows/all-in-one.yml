name: All In One

on:
  workflow_dispatch:

concurrency:
  group: all-in-one
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  rust_checks:
    uses: ./.github/workflows/rust-checks.yml

  ai_docs:
    uses: ./.github/workflows/ai-docs.yml

  docker_build_publish:
    needs: [ci, rust_checks]
    uses: ./.github/workflows/docker-build-publish.yml

  pipeline_summary:
    needs: [ci, rust_checks, ai_docs, docker_build_publish]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Pipeline summary
        run: |
          echo "========== PIPELINE SUMMARY =========="
          echo "CI:        ${{ needs.ci.result }}"
          echo "Rust:      ${{ needs.rust_checks.result }}"
          echo "Docs:      ${{ needs.ai_docs.result }}"
          echo "Build:     ${{ needs.docker_build_publish.result }}"
          echo "Commit:    $GITHUB_SHA"
          echo "Branch:    $GITHUB_REF_NAME"
          echo "Actor:     $GITHUB_ACTOR"
          echo "Run URL:   https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "====================================="

      - name: Compute overall status
        run: |
          if [[ "${{ needs.ci.result }}" == "success" && \
                "${{ needs.rust_checks.result }}" == "success" && \
                "${{ needs.docker_build_publish.result }}" == "success" ]]; then
            echo "OVERALL=SUCCESS"
          else
            echo "OVERALL=FAILED"
          fi