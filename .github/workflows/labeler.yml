name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    # Its a 32vcpu runner as its funny. That is the only reason. To be honest it makes no difference
    # It just goes through a tiny bit of the free 3k minutes anyway.
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
