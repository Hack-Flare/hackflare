services:
  api:
    profiles: [backend]
    build:
      context: ./hackflare_api
      dockerfile: Dockerfile
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - RUST_LOG=debug,hackflare=trace
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    profiles: [backend]
    image: postgres:18
    restart: always
    shm_size: 256mb
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18

  pgadmin4:
    profiles: [backend]
    image: dpage/pgadmin4
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db


volumes:
  pgdata:
