[package]
name = "hackflare-dns"
version = "0.1.0"
edition = "2024"

[lib]
name = "hackflare_dns"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
base64 = "0.22"
hickory-server = "0.26.1"
idna = "1.1.0"
parking_lot = "0.12"
postgres = "0.19"
rand = "0.10.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["net", "rt-multi-thread", "sync", "time"] }
