services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "53:5353/udp"
      - "53:5353/tcp"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:18
    shm_size: 256mb
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackflare"]
      interval: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
