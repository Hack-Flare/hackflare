services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: hackflare
      POSTGRES_PASSWORD: hackflare
      POSTGRES_DB: hackflare
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U hackflare -d hackflare'
      interval: 30s
      timeout: 20s
      retries: 20

  hackflare:
    image: ghcr.io/hack-flare/hackflare:latest
    pull_policy: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PHX_SERVER: "true"
      MIX_ENV: "prod"
      PORT: "4000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "hackflare"
      DB_PASS: "hackflare"
      DB_NAME: "hackflare"
      HCA_CID: "9d21b18293928bd8046379ffca85cd1b"
      HCA_SEC: "a5e95ed48ce14b66fd13fd305dcb21554e844b878839916f6d9ecd394f450117"
      HCA_REDIR_URL: "https://hackflare.kirze.de/auth/callback"
      SECRET_KEY_BASE: "Sx/6AL8gOMUfxLVU78lnIqghTEOe9pefhaGIOFVP3NYtBBvhFq+Yc46XFs9/3FBt"
    ports:
      - "4000:4000"
      - "53:53/udp"
      - "53:53/tcp"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1:4000/health'
      interval: 30s
      timeout: 10s
      retries: 20

volumes:
  db_data:
