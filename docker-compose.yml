services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: hackflare
      POSTGRES_PASSWORD: hackflare
      POSTGRES_DB: hackflare
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackflare -d hackflare"]
      interval: 30s
      timeout: 20s
      retries: 20
    restart: unless-stopped

  backend:
    image: ghcr.io/hack-flare/hackflare-backend:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hackflare:hackflare@db:5432/hackflare
      BACKEND_BIND_HOST: 0.0.0.0
      BACKEND_BIND_PORT: "8080"
      BACKEND_DNS_BIND_HOST: 0.0.0.0
      BACKEND_DNS_BIND_PORT: "5353"
    ports:
      - "8080:8080"
      - "53:5353/udp"
      - "53:5353/tcp"
    restart: unless-stopped

volumes:
  db_data:
